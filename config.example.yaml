# Fusion provider configuration.
# Copy this file to `config.yaml` (it is git-ignored) and edit for your setup.
# Env overrides: FUSION_PORT, FUSION_HOST, FUSION_AUTH_KEY, FUSION_CONFIG, FUSION_HOME.

server:
  host: 127.0.0.1
  port: 8787
  # Optional. If set, clients must send it as `Authorization: Bearer <key>` or
  # `x-api-key: <key>`. Leave unset for unauthenticated local use.
  # authKey: "test"

# Upstream models Fusion can route to.
# type: openai | openai-compatible | anthropic | codex | ollama
upstreams:
  # Your ChatGPT/Codex subscription, reusing the local `codex` CLI login
  # (~/.codex/auth.json) or `fusion auth login`. No API key needed.
  # models: omit to expose every model in ~/.codex/models_cache.json.
  # gpt-5.5 is the current OpenAI SOTA model; gpt-5.4 / gpt-5.4-mini also work.
  - id: codex
    type: codex
    models: ["gpt-5.5"]
    reasoningEffort: xhigh # gpt-5.5 supports low | medium | high | xhigh

  # Ollama Cloud (OpenAI-compatible at ollama.com/v1; needs an API key).
  # Thinking models (glm/kimi/minimax) reason by default — no effort flag needed.
  # - id: glm
  #   type: openai-compatible
  #   baseURL: https://ollama.com/v1
  #   apiKeyEnv: OLLAMA_API_KEY
  #   models: ["glm-5.2"]
  #   capabilityOverrides: { tools: true, modalities: [text], contextWindow: 1000000, maxOutputTokens: 32768 }
  # Local models via Ollama (OpenAI-compatible at /v1; capabilities via /api).
  - id: ollama
    type: ollama
    baseURL: http://localhost:11434/v1
    # models: ["qwen2.5-coder:14b", "llama3.2-vision"]   # omit to auto-discover

  # Any OpenAI-compatible endpoint (OpenRouter, vLLM, LM Studio, Together, ...).
  - id: openrouter
    type: openai-compatible
    baseURL: https://openrouter.ai/api/v1
    apiKeyEnv: OPENROUTER_API_KEY
    models: ["anthropic/claude-sonnet-4.5"]

  # Anthropic API (optional panel member; needs an API key).
  # - id: anthropic
  #   type: anthropic
  #   apiKeyEnv: ANTHROPIC_API_KEY
  #   models: ["claude-sonnet-4-5"]

# Routing pools.
pools:
  # The orchestrator/judge ring (judge for panels + default single-route ring). Round-robin + failover.
  orchestrator: [codex, openrouter]
  # smart "compact" tier — one fast model for trivial requests (defaults to [orchestrator[0]]).
  compact: [codex]
  # smart "regular" tier — round-robin between 1-2 models (defaults to first 2 of orchestrator).
  regular: [codex, openrouter]
  # Agentic/tool turns drive through the "actor" ring — your strongest tool-driver,
  # pinned per session via affinity (defaults to the orchestrator members if unset).
  actor: [codex]
  # Named panels: the models that "give opinions" for panel routing / the "plan" tier
  # / the council advisors.
  panel:
    default: [codex, openrouter, ollama]
    council: [openrouter, ollama] # council advisors (exclude the actor for diversity)

routing:
  # single = always one model (round-robin + failover);
  # smart  = local embedding model classifies request complexity into a tier (see docs/ROUTING.md);
  # all    = always fuse (panel: every model + judge), i.e. OpenRouter-style Fusion.
  mode: smart
  defaultPanel: default
  # Agentic/tool requests (Claude Code, etc.) always route single. The panel is
  # text-only fusion and CANNOT merge tool calls — sending a tool request there
  # returns prose with no tool_use, which stalls the agent loop. `true` also skips
  # the classifier on tool turns (cheap + deterministic). Even with `false`, a
  # tool request is never sent to the panel (it degrades to single). Non-tool
  # requests still get full smart routing (compact/regular/plan→panel).
  forceSingleWhenTools: true
  imageFallback: error # error | strip  (when images present but no vision model)
  smart:
    # In-process ONNX code embedding model (downloaded once to the HF cache).
    # Lighter alternative: { model: Xenova/all-MiniLM-L6-v2, dtype: q8 }
    embeddings: { model: jinaai/jina-embeddings-v2-base-code, dtype: q8 }
    tiers:
      compact: { pool: compact } # → single
      regular: { pool: regular } # → single, round-robin
      plan: { panel: default } # → all (panel + judge)
    # Min cosine to a harness-mode anchor (plan-mode / compaction prompt) to force that tier.
    thresholds: { harnessConfidence: 0.5 }
    fallbackTier: regular # only used for a genuinely empty request
    # anchors: { compact: [...], regular: [...], plan: [...] }   # optional; sensible built-in defaults
    # Embeddings are the ONLY classifier — no token/keyword fallback. If the model
    # can't load, smart requests error (503) and /health shows classifier.error.
  # Council-then-act: on hard agentic (tool) turns, a panel of advisor models
  # deliberates as TEXT (no tool execution → no stall), an optional judge condenses
  # it into a briefing, and the pinned `actor` model runs WITH the real tools + that
  # briefing. This is how multi-model reasoning reaches tool-calling agents (the
  # plain panel can't). Routine turns skip it (single actor, fast). Disabled by default.
  council:
    enabled: false
    panel: council # advisor panel (deliberate; the actor model is auto-excluded)
    trigger: plan # convene only on hard turns; "always" fuses every agentic turn
    synthesize: true # judge condenses advisors into one briefing (false = inject raw)

caching:
  anthropic:
    enabled: true
    maxBreakpoints: 4
    oneHour: true
  promptCacheKey:
    enabled: true
  sessionAffinity:
    # Pin a conversation to one upstream across turns. Recommended for agentic
    # coding: keeps reasoning, tool_call linkage, and prompt-cache reads coherent
    # over a long multi-turn session instead of round-robining a new model each turn.
    enabled: true

capabilities:
  refreshIntervalSec: 900
